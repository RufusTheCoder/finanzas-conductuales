<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de Sesgos — Finanzas Conductuales</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
    }

    header {
      background: #1d1d1f;
      color: #fff;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header span { font-size: .85rem; color: #aaa; }

    .controls {
      padding: 1.25rem 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      background: #fff;
      border-bottom: 1px solid #e5e5ea;
    }
    .controls input {
      padding: .45rem .75rem;
      border: 1px solid #d1d1d6;
      border-radius: 8px;
      font-size: .9rem;
      width: 280px;
      outline: none;
    }
    .controls input:focus { border-color: #007aff; }
    .filter-btn {
      padding: .4rem .9rem;
      border-radius: 20px;
      border: 1px solid #d1d1d6;
      background: #fff;
      font-size: .82rem;
      cursor: pointer;
      transition: all .15s;
    }
    .filter-btn.active { background: #1d1d1f; color: #fff; border-color: #1d1d1f; }
    .filter-btn:hover:not(.active) { background: #f5f5f7; }
    .count { margin-left: auto; font-size: .85rem; color: #6e6e73; }

    .table-wrap {
      padding: 1.5rem 2rem;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      font-size: .875rem;
    }
    thead tr { background: #f5f5f7; }
    th {
      padding: .75rem 1rem;
      text-align: left;
      font-weight: 600;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #6e6e73;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: #1d1d1f; }
    th.sorted { color: #007aff; }
    th .arrow { margin-left: .3rem; opacity: .5; }
    th.sorted .arrow { opacity: 1; }

    td {
      padding: .75rem 1rem;
      border-top: 1px solid #f0f0f5;
      vertical-align: top;
    }
    tr:hover td { background: #fafafa; }

    .tipo-badge {
      display: inline-block;
      padding: .2rem .55rem;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .tipo-badge.cognitivo { background: #e3f0ff; color: #0066cc; }
    .tipo-badge.emocional { background: #fff0e3; color: #b05600; }
    .tipo-badge.dual      { background: #f0e3ff; color: #6600cc; }

    .clase-badge {
      display: inline-block;
      background: #f5f5f7;
      border-radius: 6px;
      padding: .15rem .5rem;
      font-size: .8rem;
      color: #6e6e73;
    }

    .titulo-cell strong { display: block; font-weight: 600; }
    .titulo-cell em { font-style: italic; font-size: .8rem; color: #8e8e93; }

    .def-cell { max-width: 320px; color: #3a3a3c; line-height: 1.5; }

    .exp-cell { max-width: 360px; color: #3a3a3c; line-height: 1.5; }
    .exp-cell.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .ejemplos-cell { max-width: 280px; }
    .ejemplo-item { margin-bottom: .5rem; }
    .ejemplo-label { font-weight: 600; font-size: .78rem; color: #007aff; }
    .ejemplo-text { font-size: .82rem; color: #3a3a3c; line-height: 1.4; }

    .antidotos-cell { max-width: 280px; }
    .antidoto-item {
      display: flex;
      gap: .4rem;
      margin-bottom: .4rem;
      font-size: .82rem;
      color: #1c7c54;
      line-height: 1.4;
    }
    .antidoto-item::before { content: "✓"; flex-shrink: 0; font-weight: 700; }

    .expand-btn {
      background: none;
      border: none;
      color: #007aff;
      cursor: pointer;
      font-size: .8rem;
      padding: .2rem 0;
      margin-top: .25rem;
      display: block;
    }

    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      max-width: 680px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
      position: relative;
    }
    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      background: #f5f5f7; border: none; border-radius: 50%;
      width: 32px; height: 32px;
      cursor: pointer; font-size: 1rem; color: #6e6e73;
    }
    .modal h2 { font-size: 1.35rem; margin-bottom: .25rem; }
    .modal .modal-sub { color: #8e8e93; font-style: italic; margin-bottom: 1.25rem; }
    .modal section { margin-bottom: 1.5rem; }
    .modal section h3 { font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; color: #6e6e73; margin-bottom: .6rem; font-weight: 600; }
    .modal section p { line-height: 1.6; color: #3a3a3c; font-size: .9rem; }
    .modal .modal-meta { display: flex; gap: .75rem; margin-bottom: 1.5rem; align-items: center; }

    .loading { text-align: center; padding: 3rem; color: #6e6e73; }
    .error { text-align: center; padding: 3rem; color: #c0392b; }

    @media (max-width: 768px) {
      .table-wrap { padding: 1rem; }
      .controls { padding: 1rem; }
      .def-cell, .exp-cell, .ejemplos-cell, .antidotos-cell { max-width: 220px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Catálogo de Sesgos Conductuales</h1>
  <span>Finanzas Conductuales · Iberoamericana CDMX</span>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Buscar por título, definición, ejemplos…" />
  <button class="filter-btn active" data-tipo="all">Todos</button>
  <button class="filter-btn" data-tipo="cognitivo">Cognitivo</button>
  <button class="filter-btn" data-tipo="emocional">Emocional</button>
  <button class="filter-btn" data-tipo="dual">Dual</button>
  <span class="count" id="count"></span>
</div>

<div class="table-wrap">
  <div class="loading" id="loading">Cargando módulos…</div>
  <table id="table" style="display:none">
    <thead>
      <tr>
        <th data-col="clase">Clase <span class="arrow">↕</span></th>
        <th data-col="tipo">Tipo <span class="arrow">↕</span></th>
        <th data-col="titulo">Título / Subtítulo <span class="arrow">↕</span></th>
        <th>Definición</th>
        <th>Explicación</th>
        <th>Ejemplos concretos</th>
        <th>Antídotos</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="error" id="error" style="display:none"></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script type="module">
  const SUPABASE_URL = 'https://ncausitrddvtoyivolkj.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jYXVzaXRyZGR2dG95aXZvbGtqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDI0NDAsImV4cCI6MjA5MTYxODQ0MH0.FqUNSkwcMVnC3DfyMV4eTOVDqS67dcTbK3TydZinnq4';

  let allData = [];
  let sortCol = 'clase';
  let sortDir = 1;
  let filterTipo = 'all';
  let searchQ = '';

  async function load() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/sesgos_catalog?select=*&order=clase.asc`, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
      });
      if (!res.ok) throw new Error(await res.text());
      allData = await res.json();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('table').style.display = '';
      render();
    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      const el = document.getElementById('error');
      el.style.display = '';
      el.textContent = 'Error al cargar: ' + e.message;
    }
  }

  function filtered() {
    return allData
      .filter(r => filterTipo === 'all' || r.tipo === filterTipo)
      .filter(r => {
        if (!searchQ) return true;
        const q = searchQ.toLowerCase();
        return [r.titulo, r.subtitulo, r.definicion, r.explicacion,
                JSON.stringify(r.ejemplos), JSON.stringify(r.antidotos)]
          .some(f => f?.toLowerCase().includes(q));
      })
      .sort((a, b) => {
        const av = a[sortCol], bv = b[sortCol];
        if (typeof av === 'number') return (av - bv) * sortDir;
        return String(av).localeCompare(String(bv)) * sortDir;
      });
  }

  function render() {
    const rows = filtered();
    document.getElementById('count').textContent = `${rows.length} sesgo${rows.length !== 1 ? 's' : ''}`;
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td><span class="clase-badge">Clase ${r.clase}</span></td>
        <td><span class="tipo-badge ${r.tipo}">${r.tipo.charAt(0).toUpperCase() + r.tipo.slice(1)}</span></td>
        <td class="titulo-cell">
          <strong>${r.titulo}</strong>
          <em>${r.subtitulo}</em>
        </td>
        <td class="def-cell">${r.definicion}</td>
        <td class="exp-cell">
          <span class="exp-short collapsed">${r.explicacion}</span>
          <button class="expand-btn" onclick="toggleExp(this)">Ver más</button>
        </td>
        <td class="ejemplos-cell">${(r.ejemplos || []).map(e => `
          <div class="ejemplo-item">
            <div class="ejemplo-label">${e.label}</div>
            <div class="ejemplo-text">${e.text}</div>
          </div>`).join('')}
        </td>
        <td class="antidotos-cell">${(r.antidotos || []).map(a => `
          <div class="antidoto-item">${a}</div>`).join('')}
        </td>
      </tr>
    `).join('');

    // update sort arrows
    document.querySelectorAll('th[data-col]').forEach(th => {
      th.classList.toggle('sorted', th.dataset.col === sortCol);
      const arrow = th.querySelector('.arrow');
      if (arrow) arrow.textContent = th.dataset.col === sortCol ? (sortDir === 1 ? '↑' : '↓') : '↕';
    });
  }

  window.toggleExp = function(btn) {
    const span = btn.previousElementSibling;
    const collapsed = span.classList.toggle('collapsed');
    btn.textContent = collapsed ? 'Ver más' : 'Ver menos';
  };

  // Sort
  document.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      if (sortCol === th.dataset.col) sortDir *= -1;
      else { sortCol = th.dataset.col; sortDir = 1; }
      render();
    });
  });

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filterTipo = btn.dataset.tipo;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  // Search
  document.getElementById('search').addEventListener('input', e => {
    searchQ = e.target.value.trim();
    render();
  });

  // Modal close
  document.getElementById('modal-close').addEventListener('click', () => {
    document.getElementById('modal-overlay').classList.remove('open');
  });
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
  });

  load();
</script>
</body>
</html>
