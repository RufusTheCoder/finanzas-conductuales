<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backoffice · Finanzas Conductuales</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=20260423a">
</head>
<body>

<!-- LOGIN GATE -->
<div id="screen-login" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--ink)">
  <div style="width:100%;max-width:360px;padding:2rem">
    <div style="font-family:var(--ff-display);font-size:1.6rem;color:white;margin-bottom:.5rem">Backoffice</div>
    <div style="font-size:.85rem;color:var(--ink-4);margin-bottom:2rem">Finanzas Conductuales · Ibero CDMX</div>
    <form id="login-form" style="display:flex;flex-direction:column;gap:12px">
      <input type="email" name="email" placeholder="Correo admin" class="auth-input" required>
      <input type="password" name="password" placeholder="Contraseña" class="auth-input" required>
      <button type="submit" class="btn-primary">Entrar</button>
      <div id="login-error" style="display:none;font-size:.85rem;color:#FCA5A5;text-align:center"></div>
    </form>
    <div style="margin-top:1.5rem;text-align:center">
      <button id="dev-skip" style="background:none;border:none;font-size:.72rem;color:rgba(255,255,255,.2);cursor:pointer;font-family:var(--ff-body)">dev skip</button>
    </div>
  </div>
</div>

<!-- ADMIN APP -->
<div id="admin-app" hidden>
  <nav class="admin-nav">
    <div class="admin-nav-title">Backoffice · Finanzas Conductuales</div>
    <div style="display:flex;align-items:center;gap:1rem">
      <span id="last-refresh" style="color:rgba(255,255,255,.35);font-size:.72rem"></span>
      <label style="display:inline-flex;align-items:center;gap:4px;color:rgba(255,255,255,.55);font-size:.72rem;cursor:pointer;user-select:none">
        <input type="checkbox" id="btn-autorefresh" style="cursor:pointer"> Auto 30s
      </label>
      <button class="btn-ghost" id="btn-refresh" style="color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.2)">↻ Actualizar</button>
      <a href="index.html" style="color:rgba(255,255,255,.4);font-size:.8rem;text-decoration:none">← App</a>
    </div>
  </nav>

  <div class="admin-body">
    <div class="admin-tabs">
      <button class="tab-btn active" data-tab="resumen">Resumen</button>
      <button class="tab-btn" data-tab="preguntas">Preguntas</button>
      <button class="tab-btn" data-tab="usuarios">Usuarios</button>
      <button class="tab-btn" data-tab="feedback">Feedback</button>
      <button class="tab-btn" data-tab="errores">Errores</button>
      <button class="tab-btn" data-tab="backups">Backups</button>
    </div>

    <div class="tab-content">
      <div id="tab-resumen"   class="tab-pane active"><p style="color:var(--ink-4)">Cargando…</p></div>
      <div id="tab-preguntas" class="tab-pane"><p style="color:var(--ink-4)">Cargando…</p></div>
      <div id="tab-usuarios"  class="tab-pane"><p style="color:var(--ink-4)">Cargando…</p></div>
      <div id="tab-feedback"  class="tab-pane"><p style="color:var(--ink-4)">Cargando…</p></div>
      <div id="tab-errores"   class="tab-pane"><p style="color:var(--ink-4)">Cargando…</p></div>
      <div id="tab-backups"   class="tab-pane"><p style="color:var(--ink-4)">Cargando…</p></div>
    </div>
  </div>
</div>

<!-- USER DETAIL DRAWER -->
<div id="user-detail" style="position:fixed;inset:0;z-index:1000;display:none;justify-content:flex-end">
  <div id="user-detail-backdrop" style="position:absolute;inset:0;background:rgba(0,0,0,.45)"></div>
  <div style="position:relative;width:100%;max-width:880px;background:var(--paper);overflow-y:auto;box-shadow:-12px 0 40px rgba(0,0,0,.25)">
    <div id="user-detail-body" style="padding:1.75rem 2rem"></div>
  </div>
</div>

<script type="module" src="js/admin.js?v=20260423a"></script>
</body>
</html>
